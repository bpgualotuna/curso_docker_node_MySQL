openapi: 3.0.0
info:
  title: API de Gestion de Tareas
  version: 1.0.0
  description: API para la gestión de tareas con autenticación JWT

servers:
  - url: http://localhost:3000
    description: Servidor local de desarrollo

paths:
  post:
    summary: Iniciar Sesion
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              email:
                type: string
                example: example@example.com
              password:
                type: string
                example: example123
            required:
              - email
              - password
    responses:
      "200":
        description: Sesion iniciada exitosamente
      "500":
        description: Error al iniciar sesion

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
